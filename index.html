<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AICA - AI角色社区</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a; --bg4: #222222;
      --text: #f0f0f0; --text2: #888888; --text3: #555555;
      --border: #2a2a2a; --border2: #333333; --white: #ffffff;
      --danger: #ff4444; --success: #44cc88;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* 导航 */
    .navbar {
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 52px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 15px; font-weight: 700; color: var(--white); letter-spacing: -0.3px; cursor: pointer; }
    .nav-links { display: flex; gap: 2px; }
    .nav-btn {
      color: var(--text2); background: none; border: none;
      padding: 5px 11px; border-radius: 6px; font-size: 13px;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .nav-btn:hover { color: var(--text); background: var(--bg3); }
    .nav-btn.active { color: var(--white); background: var(--bg3); }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-username { font-size: 12px; color: var(--text3); }

    /* 按钮 */
    .btn { padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; font-family: inherit; }
    .btn-white { background: var(--white); color: #000; }
    .btn-white:hover { background: #e0e0e0; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
    .btn-ghost:hover { background: var(--bg3); color: var(--text); }
    .btn-dark { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
    .btn-dark:hover { background: var(--bg4); }

    /* 容器 */
    .container { max-width: 1080px; margin: 0 auto; padding: 28px 16px; }
    .page { display: none; }
    .page.active { display: block; }

    /* 表单 */
    input, textarea, select {
      background: var(--bg2); border: 1px solid var(--border2); color: var(--text);
      padding: 9px 12px; border-radius: 7px; font-size: 13px; outline: none;
      width: 100%; transition: border 0.15s; font-family: inherit;
    }
    input:focus, textarea:focus { border-color: #555; }
    input::placeholder, textarea::placeholder { color: var(--text3); }
    textarea { resize: vertical; min-height: 88px; }
    label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 5px; letter-spacing: 0.4px; text-transform: uppercase; }
    .form-group { margin-bottom: 14px; }

    /* 弹窗 */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px;
      padding: 24px; width: calc(100% - 32px); max-width: 440px;
      max-height: 88vh; overflow-y: auto; position: relative;
    }
    .modal h2 { margin-bottom: 20px; font-size: 16px; font-weight: 600; color: var(--white); }
    .close-btn {
      position: absolute; top: 14px; right: 16px; background: none; border: none;
      color: var(--text3); cursor: pointer; font-size: 20px; line-height: 1; transition: color 0.15s;
    }
    .close-btn:hover { color: var(--text); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 8px; padding: 10px 20px; font-size: 13px;
      z-index: 9999; opacity: 0; transition: all 0.25s; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    /* 标签 */
    .tag {
      display: inline-block; background: var(--bg3); color: var(--text2);
      border: 1px solid var(--border2); border-radius: 4px; padding: 2px 8px; font-size: 11px;
    }
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .empty { text-align: center; padding: 50px 20px; color: var(--text3); font-size: 13px; }
    .loading { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }

    /* ===== 角色市场 ===== */
    .market-top { margin-bottom: 24px; }
    .market-top h1 { font-size: 22px; font-weight: 700; color: var(--white); margin-bottom: 3px; }
    .market-top p { font-size: 13px; color: var(--text3); }
    .market-controls { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
    .market-controls input { flex: 1; min-width: 180px; }
    .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-btn {
      padding: 4px 12px; border-radius: 4px; border: 1px solid var(--border2);
      background: transparent; color: var(--text3); cursor: pointer;
      font-size: 12px; transition: all 0.15s; font-family: inherit;
    }
    .filter-btn:hover { color: var(--text); border-color: #555; }
    .filter-btn.active { background: var(--white); color: #000; border-color: var(--white); font-weight: 500; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .char-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; cursor: pointer; transition: all 0.15s;
      display: flex; flex-direction: column; gap: 10px;
    }
    .char-card:hover { border-color: var(--border2); background: var(--bg3); }
    .char-head { display: flex; align-items: center; gap: 10px; }
    .char-emoji {
      width: 44px; height: 44px; border-radius: 8px; background: var(--bg3);
      border: 1px solid var(--border2); display: flex; align-items: center;
      justify-content: center; font-size: 22px; flex-shrink: 0;
    }
    .char-name { font-size: 14px; font-weight: 600; color: var(--white); }
    .char-author { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .char-desc {
      font-size: 12px; color: var(--text2); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .char-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .char-foot { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .char-stats { display: flex; gap: 10px; font-size: 11px; color: var(--text3); }
    .like-btn {
      background: transparent; border: 1px solid var(--border2); color: var(--text3);
      padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
      transition: all 0.15s; font-family: inherit;
    }
    .like-btn:hover { border-color: #555; color: var(--text); }
    .like-btn.liked { border-color: #666; color: var(--text); }
    .detail-emoji {
      width: 64px; height: 64px; border-radius: 12px; background: var(--bg3);
      border: 1px solid var(--border2); display: flex; align-items: center;
      justify-content: center; font-size: 32px; margin-bottom: 14px;
    }
    .section-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin: 14px 0 6px; }

    /* ===== 论坛 ===== */
    .forum-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 12px; }
    .forum-top h1 { font-size: 22px; font-weight: 700; color: var(--white); margin-bottom: 3px; }
    .forum-top p { font-size: 13px; color: var(--text3); }
    .post-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s;
    }
    .post-card:hover { border-color: var(--border2); background: var(--bg3); }
    .post-title { font-size: 14px; font-weight: 600; color: var(--white); margin-bottom: 5px; line-height: 1.4; }
    .post-meta { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .post-preview {
      font-size: 12px; color: var(--text2); line-height: 1.6; margin-top: 8px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .post-foot { display: flex; align-items: center; gap: 14px; margin-top: 12px; }
    .action-btn {
      background: transparent; border: none; color: var(--text3); cursor: pointer;
      font-size: 12px; display: flex; align-items: center; gap: 4px;
      padding: 3px 6px; border-radius: 5px; transition: all 0.15s; font-family: inherit;
    }
    .action-btn:hover { background: var(--bg4); color: var(--text2); }
    .action-btn.liked { color: var(--text); }
    .back-btn {
      background: none; border: none; color: var(--text2); cursor: pointer;
      font-size: 13px; margin-bottom: 18px; display: flex; align-items: center;
      gap: 6px; padding: 0; font-family: inherit; transition: color 0.15s;
    }
    .back-btn:hover { color: var(--text); }
    .detail-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 22px; margin-bottom: 14px; }
    .detail-title { font-size: 20px; font-weight: 700; color: var(--white); margin-bottom: 8px; line-height: 1.4; }
    .detail-meta { font-size: 11px; color: var(--text3); margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .detail-body { font-size: 13px; line-height: 1.8; color: var(--text2); white-space: pre-wrap; }
    .replies-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 10px; }
    .reply-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 8px; }
    .reply-meta { font-size: 11px; color: var(--text3); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .reply-body { font-size: 13px; line-height: 1.7; color: var(--text2); white-space: pre-wrap; }
    .reply-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-top: 12px; }
    .reply-box h3 { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 12px; }

    /* ===== 好友 ===== */
    .friends-layout { display: grid; grid-template-columns: 260px 1fr; gap: 14px; height: calc(100vh - 52px - 80px); }
    .left-panel { display: flex; flex-direction: column; gap: 12px; overflow: hidden; }
    .panel-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
    .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .panel-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; font-weight: 500; }
    .panel-body { overflow-y: auto; }
    .friend-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 16px;
      cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border);
    }
    .friend-item:last-child { border-bottom: none; }
    .friend-item:hover { background: var(--bg3); }
    .friend-item.active { background: var(--bg3); }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%; background: var(--bg3);
      border: 1px solid var(--border2); display: flex; align-items: center;
      justify-content: center; font-size: 13px; font-weight: 600;
      color: var(--text2); flex-shrink: 0;
    }
    .friend-name { font-size: 13px; color: var(--text); font-weight: 500; }
    .friend-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .request-item { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .request-item:last-child { border-bottom: none; }
    .request-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .request-actions { display: flex; gap: 6px; }
    .chat-area { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
    .chat-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 13px; }
    .chat-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .chat-header .name { font-size: 14px; font-weight: 600; color: var(--white); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { display: flex; gap: 8px; max-width: 75%; }
    .msg.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-bubble {
      background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px;
      padding: 8px 12px; font-size: 13px; line-height: 1.6; color: var(--text);
    }
    .msg.mine .msg-bubble { background: var(--bg4); border-color: #3a3a3a; }
    .msg-time { font-size: 10px; color: var(--text3); margin-top: 3px; }
    .msg.mine .msg-time { text-align: right; }
    .chat-input-area { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
    .chat-input-area textarea { flex: 1; min-height: 38px; max-height: 100px; resize: none; }
    .search-result { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .search-result:last-child { border-bottom: none; }

    /* 视图切换 */
    .forum-list { display: block; }
    .forum-list.hidden { display: none; }
    .forum-detail { display: none; }
    .forum-detail.active { display: block; }

    select { width: auto; }

    @media(max-width: 640px) {
      .navbar { padding: 0 12px; }
      .nav-links { gap: 0; }
      .nav-btn { padding: 5px 7px; font-size: 12px; }
      .grid { grid-template-columns: 1fr; }
      .friends-layout { grid-template-columns: 1fr; height: auto; }
      .chat-area { height: 60vh; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <span class="logo" onclick="switchPage('market')">AICA</span>
  <div class="nav-links">
    <button class="nav-btn active" id="nav-market" onclick="switchPage('market')">角色市场</button>
    <button class="nav-btn" id="nav-forum" onclick="switchPage('forum')">论坛</button>
    <button class="nav-btn" id="nav-friends" onclick="switchPage('friends')">好友</button>
  </div>
  <div class="nav-right">
    <span class="nav-username" id="navUser"></span>
    <button class="btn btn-ghost" id="authBtn" onclick="openAuth()">登录</button>
    <button class="btn btn-white" id="uploadBtn" style="display:none" onclick="openUpload()">+ 发布</button>
  </div>
</nav>

<div class="container">

  <!-- 角色市场 -->
  <div class="page active" id="page-market">
    <div class="market-top">
      <h1>角色市场</h1>
      <p>发现和分享你的 AI 角色</p>
      <div class="market-controls">
        <input type="text" id="searchInput" placeholder="搜索角色..." />
        <select id="sortSelect" onchange="loadChars()">
          <option value="created_at">最新</option>
          <option value="downloads">最多下载</option>
          <option value="likes">最多点赞</option>
        </select>
        <button class="btn btn-dark" onclick="loadChars()">搜索</button>
      </div>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="filterTag(this,'')">全部</button>
      <button class="filter-btn" onclick="filterTag(this,'温柔')">温柔</button>
      <button class="filter-btn" onclick="filterTag(this,'搞笑')">搞笑</button>
      <button class="filter-btn" onclick="filterTag(this,'傲娇')">傲娇</button>
      <button class="filter-btn" onclick="filterTag(this,'冒险')">冒险</button>
      <button class="filter-btn" onclick="filterTag(this,'学习')">学习</button>
      <button class="filter-btn" onclick="filterTag(this,'游戏')">游戏</button>
    </div>
    <div class="grid" id="charGrid"><div class="loading">加载中...</div></div>
  </div>

  <!-- 论坛 -->
  <div class="page" id="page-forum">
    <div class="forum-list" id="forumList">
      <div class="forum-top">
        <div>
          <h1>论坛</h1>
          <p>分享你的 AI 角色使用心得</p>
        </div>
        <button class="btn btn-white" onclick="openNewPost()">+ 发帖</button>
      </div>
      <div id="postsContainer"><div class="loading">加载中...</div></div>
    </div>
    <div class="forum-detail" id="forumDetail">
      <button class="back-btn" onclick="goBackForum()">← 返回列表</button>
      <div class="detail-card" id="detailCard"></div>
      <div class="replies-label" id="repliesLabel">回复（0）</div>
      <div id="repliesContainer"></div>
      <div class="reply-box" id="replyBox">
        <h3>发表回复</h3>
        <div class="form-group">
          <textarea id="replyContent" placeholder="写下你的想法..."></textarea>
        </div>
        <button class="btn btn-white" onclick="submitReply()">发布回复</button>
      </div>
    </div>
  </div>

  <!-- 好友 -->
  <div class="page" id="page-friends">
    <div id="friendsContent"></div>
  </div>

</div>

<!-- 登录注册弹窗 -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <button class="close-btn" onclick="closeAuth()">×</button>
    <h2 id="authTitle">登录</h2>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="authEmail" placeholder="your@email.com" />
    </div>
    <div class="form-group" id="usernameWrap" style="display:none">
      <label>用户名</label>
      <input type="text" id="authUsername" placeholder="起个名字..." />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="••••••••" />
    </div>
    <button class="btn btn-white" style="width:100%;margin-bottom:12px;padding:10px" onclick="submitAuth()">确认</button>
    <p style="text-align:center;font-size:12px;color:var(--text3)">
      <span id="authSwitch" onclick="toggleAuth()" style="cursor:pointer;color:var(--text2)">没有账号？去注册</span>
    </p>
  </div>
</div>

<!-- 发布角色弹窗 -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal" style="max-width:460px">
    <button class="close-btn" onclick="closeUpload()">×</button>
    <h2>发布角色</h2>
    <div class="form-group">
      <label>角色名称</label>
      <input type="text" id="charName" placeholder="角色叫什么？" />
    </div>
    <div class="form-group">
      <label>头像 Emoji</label>
      <input type="text" id="charEmoji" placeholder="🐱" maxlength="2" />
    </div>
    <div class="form-group">
      <label>简介</label>
      <textarea id="charDesc" placeholder="简单描述这个角色..."></textarea>
    </div>
    <div class="form-group">
      <label>详细人设</label>
      <textarea id="charPersonality" placeholder="性格、说话方式、背景故事..." style="min-height:110px"></textarea>
    </div>
    <div class="form-group">
      <label>标签（逗号分隔）</label>
      <input type="text" id="charTags" placeholder="温柔, 搞笑, 游戏" />
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-white" style="flex:1" onclick="submitChar()">发布</button>
      <button class="btn btn-ghost" onclick="closeUpload()">取消</button>
    </div>
  </div>
</div>

<!-- 角色详情弹窗 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:480px">
    <button class="close-btn" onclick="closeDetail()">×</button>
    <div id="detailContent"></div>
  </div>
</div>

<!-- 发帖弹窗 -->
<div class="modal-overlay" id="newPostModal">
  <div class="modal">
    <button class="close-btn" onclick="closeNewPost()">×</button>
    <h2>发布帖子</h2>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="postTitle" placeholder="帖子标题..." />
    </div>
    <div class="form-group">
      <label>内容</label>
      <textarea id="postContent" placeholder="写下你想说的..." style="min-height:140px"></textarea>
    </div>
    <div class="form-group">
      <label>标签（逗号分隔，可选）</label>
      <input type="text" id="postTags" placeholder="问题, 分享, 建议" />
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-white" style="flex:1" onclick="submitPost()">发布</button>
      <button class="btn btn-ghost" onclick="closeNewPost()">取消</button>
    </div>
  </div>
</div>

<!-- 添加好友弹窗 -->
<div class="modal-overlay" id="addFriendModal">
  <div class="modal">
    <button class="close-btn" onclick="closeAddFriend()">×</button>
    <h2>添加好友</h2>
    <div class="form-group">
      <label>搜索用户名</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="searchUsername" placeholder="输入用户名..." />
        <button class="btn btn-dark" onclick="searchUsers()">搜索</button>
      </div>
    </div>
    <div id="searchResults"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  const sb = createClient(
    'https://uyziqquxjbgajyqayksu.supabase.co',
    'sb_publishable__GfyF7Dtetvt0Tip5Vuf9w_o1YKRhPm',
    { auth: { persistSession: true, storageKey: 'aica-auth', storage: window.localStorage } }
  )

  let user = null
  let isLogin = true
  let activeTag = ''
  let currentChar = null
  let likedChars = new Set()
  let currentPostId = null
  let likedPosts = new Set()
  let likedReplies = new Set()
  let currentFriend = null
  let msgInterval = null

  // ===== 初始化 =====
  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    if (session?.user) {
      user = session.user
      await refreshNav()
      await loadLikedChars()
      await loadLikedForum()
    }
    loadChars()
  }

  async function refreshNav() {
    if (!user) return
    const { data: p } = await sb.from('profiles').select('username').eq('id', user.id).single()
    document.getElementById('navUser').textContent = p?.username || ''
    document.getElementById('authBtn').textContent = '退出'
    document.getElementById('authBtn').onclick = logout
    document.getElementById('uploadBtn').style.display = 'block'
  }

  // ===== 页面切换 =====
  window.switchPage = function(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'))
    document.getElementById('page-' + page).classList.add('active')
    document.getElementById('nav-' + page).classList.add('active')
    document.getElementById('uploadBtn').style.display = (page === 'market' && user) ? 'block' : 'none'
    if (page === 'forum') loadPosts()
    if (page === 'friends') renderFriendsPage()
  }

  // ===== 角色市场 =====
  async function loadLikedChars() {
    if (!user) return
    const { data } = await sb.from('character_likes').select('character_id').eq('user_id', user.id)
    if (data) data.forEach(r => likedChars.add(r.character_id))
  }

  window.loadChars = async function() {
    const grid = document.getElementById('charGrid')
    grid.innerHTML = '<div class="loading">加载中...</div>'
    const sort = document.getElementById('sortSelect').value
    const search = document.getElementById('searchInput').value.trim()
    let q = sb.from('character_market').select('*, profiles(username)').eq('is_public', true).order(sort, { ascending: false })
    if (activeTag) q = q.contains('tags', [activeTag])
    if (search) q = q.ilike('name', `%${search}%`)
    const { data, error } = await q
    if (error || !data?.length) {
      grid.innerHTML = '<div class="empty">还没有角色，来发布第一个吧</div>'
      return
    }
    grid.innerHTML = data.map(c => `
      <div class="char-card" onclick="openDetail('${c.id}')">
        <div class="char-head">
          <div class="char-emoji">${c.avatar || '🤖'}</div>
          <div>
            <div class="char-name">${escHtml(c.name)}</div>
            <div class="char-author">by ${escHtml(c.profiles?.username || '匿名')}</div>
          </div>
        </div>
        <div class="char-desc">${escHtml(c.description || '暂无简介')}</div>
        <div class="char-tags">${(c.tags||[]).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}</div>
        <div class="char-foot">
          <div class="char-stats"><span>↓ ${c.downloads||0}</span><span>♥ ${c.likes||0}</span></div>
          <button class="like-btn ${likedChars.has(c.id)?'liked':''}" onclick="event.stopPropagation();likeChar('${c.id}',this)">
            ${likedChars.has(c.id)?'♥ 已喜欢':'♡ 喜欢'}
          </button>
        </div>
      </div>
    `).join('')
  }

  window.filterTag = function(btn, tag) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    activeTag = tag
    loadChars()
  }

  window.likeChar = async function(id, btn) {
    if (!user) { openAuth(); return }
    if (likedChars.has(id)) return
    const { error } = await sb.from('character_likes').insert({ user_id: user.id, character_id: id })
    if (error) { showToast('点赞失败', 'error'); return }
    likedChars.add(id)
    btn.classList.add('liked')
    btn.textContent = '♥ 已喜欢'
    await sb.rpc('increment_likes', { char_id: id })
    showToast('已点赞', 'success')
  }

  window.openDetail = async function(id) {
    const { data: c } = await sb.from('character_market').select('*, profiles(username)').eq('id', id).single()
    if (!c) return
    currentChar = c
    document.getElementById('detailContent').innerHTML = `
      <div class="detail-emoji">${c.avatar || '🤖'}</div>
      <div style="font-size:18px;font-weight:700;color:var(--white);margin-bottom:4px">${escHtml(c.name)}</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px">
        by ${escHtml(c.profiles?.username || '匿名')} &nbsp;·&nbsp; ↓ ${c.downloads||0} &nbsp;·&nbsp; ♥ ${c.likes||0}
      </div>
      <div class="char-tags" style="margin-bottom:4px">${(c.tags||[]).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}</div>
      <hr class="divider">
      <div class="section-label">简介</div>
      <p style="font-size:13px;line-height:1.7;color:var(--text2)">${escHtml(c.description||'暂无')}</p>
      <div class="section-label">详细人设</div>
      <p style="font-size:13px;line-height:1.7;color:var(--text2);white-space:pre-wrap">${escHtml(c.personality||'暂无')}</p>
      <hr class="divider">
      <div style="display:flex;gap:8px">
        <button class="btn btn-white" style="flex:1" onclick="downloadChar()">↓ 下载角色</button>
        <button class="btn btn-ghost" onclick="likeCharDetail('${c.id}')">♡ 喜欢</button>
      </div>
    `
    document.getElementById('detailModal').classList.add('active')
    sb.from('character_market').update({ downloads: (c.downloads||0) + 1 }).eq('id', id)
  }

  window.closeDetail = () => document.getElementById('detailModal').classList.remove('active')

  window.downloadChar = function() {
    if (!currentChar) return
    const data = currentChar.character_data || {
      name: currentChar.name, avatar: currentChar.avatar,
      personality: currentChar.personality,
      description: currentChar.description, tags: currentChar.tags
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = `${currentChar.name}.json`
    a.click()
    showToast('下载成功', 'success')
  }

  window.likeCharDetail = async function(id) {
    if (!user) { openAuth(); return }
    if (likedChars.has(id)) { showToast('已经点赞过了', ''); return }
    const { error } = await sb.from('character_likes').insert({ user_id: user.id, character_id: id })
    if (!error) { likedChars.add(id); await sb.rpc('increment_likes', { char_id: id }); showToast('已点赞', 'success') }
  }

  window.submitChar = async function() {
    if (!user) { openAuth(); return }
    const name = document.getElementById('charName').value.trim()
    const avatar = document.getElementById('charEmoji').value.trim()
    const desc = document.getElementById('charDesc').value.trim()
    const personality = document.getElementById('charPersonality').value.trim()
    const tags = document.getElementById('charTags').value.split(',').map(t=>t.trim()).filter(Boolean)
    if (!name || !personality) { showToast('名称和人设不能为空', 'error'); return }
    const { error } = await sb.from('character_market').insert({
      author_id: user.id, name, avatar, description: desc,
      personality, tags, is_public: true,
      character_data: { name, avatar, personality, description: desc, tags }
    })
    if (error) { showToast('发布失败：' + error.message, 'error'); return }
    showToast('发布成功', 'success')
    closeUpload()
    ;['charName','charEmoji','charDesc','charPersonality','charTags'].forEach(id => document.getElementById(id).value = '')
    loadChars()
  }

  // ===== 论坛 =====
  async function loadLikedForum() {
    if (!user) return
    const { data } = await sb.from('forum_likes').select('post_id,reply_id').eq('user_id', user.id)
    if (data) data.forEach(r => {
      if (r.post_id) likedPosts.add(r.post_id)
      if (r.reply_id) likedReplies.add(r.reply_id)
    })
  }

  async function loadPosts() {
    const container = document.getElementById('postsContainer')
    if (!container) return
    container.innerHTML = '<div class="loading">加载中...</div>'
    const { data, error } = await sb.from('forum_posts').select('*, profiles(username)').order('created_at', { ascending: false })
    if (error || !data?.length) {
      container.innerHTML = '<div class="empty">还没有帖子，来发第一帖吧</div>'
      return
    }
    container.innerHTML = data.map(p => `
      <div class="post-card" onclick="openPost('${p.id}')">
        <div class="post-title">${escHtml(p.title)}</div>
        <div class="post-meta">
          <span>${escHtml(p.profiles?.username || '匿名')}</span>
          <span>·</span>
          <span>${timeAgo(p.created_at)}</span>
          ${(p.tags||[]).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}
        </div>
        <div class="post-preview">${escHtml(p.content)}</div>
        <div class="post-foot" onclick="event.stopPropagation()">
          <button class="action-btn ${likedPosts.has(p.id)?'liked':''}" onclick="likePost('${p.id}',this)">♥ ${p.likes||0}</button>
          <button class="action-btn">💬 ${p.reply_count||0}</button>
        </div>
      </div>
    `).join('')
  }

  window.openPost = async function(id) {
    currentPostId = id
    document.getElementById('forumList').classList.add('hidden')
    document.getElementById('forumDetail').classList.add('active')
    document.getElementById('detailCard').innerHTML = '<div class="loading">加载中...</div>'
    document.getElementById('repliesContainer').innerHTML = ''
    const { data: p } = await sb.from('forum_posts').select('*, profiles(username)').eq('id', id).single()
    if (!p) return
    document.getElementById('detailCard').innerHTML = `
      <div class="detail-title">${escHtml(p.title)}</div>
      <div class="detail-meta">
        <span>${escHtml(p.profiles?.username || '匿名')}</span>
        <span>·</span>
        <span>${timeAgo(p.created_at)}</span>
        ${(p.tags||[]).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}
      </div>
      <div class="detail-body">${escHtml(p.content)}</div>
      <hr class="divider">
      <div style="display:flex;gap:12px">
        <button class="action-btn ${likedPosts.has(p.id)?'liked':''}" onclick="likePost('${p.id}',this)">♥ ${p.likes||0} 喜欢</button>
        ${user?.id === p.author_id ? `<button class="action-btn" style="color:var(--danger)" onclick="deletePost('${p.id}')">删除</button>` : ''}
      </div>
    `
    loadReplies(id)
    if (!user) {
      document.getElementById('replyBox').innerHTML = `
        <p style="text-align:center;color:var(--text3);font-size:13px;padding:8px 0">
          <span onclick="openAuth()" style="cursor:pointer;color:var(--text2)">登录</span> 后才能回复
        </p>
      `
    }
  }

  window.goBackForum = function() {
    document.getElementById('forumList').classList.remove('hidden')
    document.getElementById('forumDetail').classList.remove('active')
    currentPostId = null
    loadPosts()
  }

  async function loadReplies(postId) {
    const container = document.getElementById('repliesContainer')
    container.innerHTML = '<div class="loading">加载中...</div>'
    const { data } = await sb.from('forum_replies').select('*, profiles(username)').eq('post_id', postId).order('created_at', { ascending: true })
    const label = document.getElementById('repliesLabel')
    if (!data?.length) {
      container.innerHTML = '<div class="empty">暂无回复</div>'
      label.textContent = '回复（0）'
      return
    }
    label.textContent = `回复（${data.length}）`
    container.innerHTML = data.map(r => `
      <div class="reply-card">
        <div class="reply-meta">
          <span>${escHtml(r.profiles?.username || '匿名')} · ${timeAgo(r.created_at)}</span>
          ${user?.id === r.author_id ? `<button class="action-btn" style="color:var(--danger);padding:0" onclick="deleteReply('${r.id}')">删除</button>` : ''}
        </div>
        <div class="reply-body">${escHtml(r.content)}</div>
        <div style="margin-top:8px">
          <button class="action-btn ${likedReplies.has(r.id)?'liked':''}" onclick="likeReply('${r.id}',this)">♥ ${r.likes||0}</button>
        </div>
      </div>
    `).join('')
  }

  window.submitPost = async function() {
    if (!user) { openAuth(); return }
    const title = document.getElementById('postTitle').value.trim()
    const content = document.getElementById('postContent').value.trim()
    const tags = document.getElementById('postTags').value.split(',').map(t=>t.trim()).filter(Boolean)
    if (!title || !content) { showToast('标题和内容不能为空', 'error'); return }
    const { error } = await sb.from('forum_posts').insert({ author_id: user.id, title, content, tags })
    if (error) { showToast('发布失败：' + error.message, 'error'); return }
    showToast('发布成功', 'success')
    closeNewPost()
    ;['postTitle','postContent','postTags'].forEach(id => document.getElementById(id).value = '')
    loadPosts()
  }

  window.submitReply = async function() {
    if (!user) { openAuth(); return }
    const content = document.getElementById('replyContent').value.trim()
    if (!content) { showToast('回复内容不能为空', 'error'); return }
    const { error } = await sb.from('forum_replies').insert({ post_id: currentPostId, author_id: user.id, content })
    if (error) { showToast('回复失败：' + error.message, 'error'); return }
    document.getElementById('replyContent').value = ''
    showToast('回复成功', 'success')
    loadReplies(currentPostId)
  }

  window.likePost = async function(id, btn) {
    if (!user) { openAuth(); return }
    if (likedPosts.has(id)) return
    const { error } = await sb.from('forum_likes').insert({ user_id: user.id, post_id: id })
    if (error) { showToast('点赞失败', 'error'); return }
    likedPosts.add(id)
    btn.classList.add('liked')
    const count = parseInt(btn.textContent.replace(/\D/g,'')) + 1
    btn.innerHTML = `♥ ${count}${btn.textContent.includes('喜欢') ? ' 喜欢' : ''}`
    await sb.from('forum_posts').update({ likes: count }).eq('id', id)
  }

  window.likeReply = async function(id, btn) {
    if (!user) { openAuth(); return }
    if (likedReplies.has(id)) return
    const { error } = await sb.from('forum_likes').insert({ user_id: user.id, reply_id: id })
    if (error) { showToast('点赞失败', 'error'); return }
    likedReplies.add(id)
    btn.classList.add('liked')
    const count = parseInt(btn.textContent.replace(/\D/g,'')) + 1
    btn.innerHTML = `♥ ${count}`
    await sb.from('forum_replies').update({ likes: count }).eq('id', id)
  }

  window.deletePost = async function(id) {
    if (!confirm('确定删除这篇帖子？')) return
    const { error } = await sb.from('forum_posts').delete().eq('id', id)
    if (error) { showToast('删除失败', 'error'); return }
    showToast('已删除', 'success')
    goBackForum()
  }

  window.deleteReply = async function(id) {
    if (!confirm('确定删除这条回复？')) return
    const { error } = await sb.from('forum_replies').delete().eq('id', id)
    if (error) { showToast('删除失败', 'error'); return }
    showToast('已删除', 'success')
    loadReplies(currentPostId)
  }

  // ===== 好友 =====
  function renderFriendsPage() {
    const container = document.getElementById('friendsContent')
    if (!user) {
      container.innerHTML = `
        <div style="text-align:center;padding:80px 20px;color:var(--text3)">
          <p style="font-size:14px;margin-bottom:16px">登录后才能使用好友功能</p>
          <button class="btn btn-white" onclick="openAuth()">登录 / 注册</button>
        </div>
      `
      return
    }
    container.innerHTML = `
      <div class="friends-layout">
        <div class="left-panel">
          <div class="panel-card" style="flex-shrink:0">
            <div class="panel-header">
              <span class="panel-title">好友请求</span>
              <button class="btn btn-dark" style="padding:4px 10px;font-size:12px" onclick="openAddFriend()">+ 添加</button>
            </div>
            <div class="panel-body" id="requestsList"><div class="loading">加载中...</div></div>
          </div>
          <div class="panel-card" style="flex:1">
            <div class="panel-header">
              <span class="panel-title">好友列表</span>
            </div>
            <div class="panel-body" style="max-height:none" id="friendsList"><div class="loading">加载中...</div></div>
          </div>
        </div>
        <div class="chat-area" id="chatArea">
          <div class="chat-placeholder">选择一个好友开始聊天</div>
        </div>
      </div>
    `
    loadRequests()
    loadFriends()
  }

  async function loadRequests() {
    const container = document.getElementById('requestsList')
    if (!container) return
    const { data } = await sb.from('friendships')
      .select('*, profiles!friendships_sender_id_fkey(username)')
      .eq('receiver_id', user.id).eq('status', 'pending')
    if (!data?.length) { container.innerHTML = '<div class="empty">暂无新请求</div>'; return }
    container.innerHTML = data.map(r => `
      <div class="request-item">
        <div class="request-top">
          <div class="avatar">${(r.profiles?.username||'?')[0].toUpperCase()}</div>
          <span style="font-size:13px;color:var(--text)">${escHtml(r.profiles?.username||'未知用户')}</span>
        </div>
        <div class="request-actions">
          <button class="btn btn-white" style="padding:4px 10px;font-size:12px" onclick="acceptRequest('${r.id}')">接受</button>
          <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" onclick="rejectRequest('${r.id}')">拒绝</button>
        </div>
      </div>
    `).join('')
  }

  async function loadFriends() {
    const container = document.getElementById('friendsList')
    if (!container) return
    const { data } = await sb.from('friendships')
      .select('*, sender:profiles!friendships_sender_id_fkey(id,username), receiver:profiles!friendships_receiver_id_fkey(id,username)')
      .or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`)
      .eq('status', 'accepted')
    if (!data?.length) { container.innerHTML = '<div class="empty">还没有好友，去添加吧</div>'; return }
    container.innerHTML = data.map(f => {
      const friend = f.sender_id === user.id ? f.receiver : f.sender
      return `
        <div class="friend-item" id="fi-${friend.id}" onclick="openChat('${friend.id}','${escHtml(friend.username)}')">
          <div class="avatar">${friend.username[0].toUpperCase()}</div>
          <div>
            <div class="friend-name">${escHtml(friend.username)}</div>
            <div class="friend-sub">点击开始聊天</div>
          </div>
        </div>
      `
    }).join('')
  }

  window.openChat = async function(friendId, friendName) {
    currentFriend = { id: friendId, name: friendName }
    if (msgInterval) clearInterval(msgInterval)
    document.querySelectorAll('.friend-item').forEach(el => el.classList.remove('active'))
    const el = document.getElementById(`fi-${friendId}`)
    if (el) el.classList.add('active')
    document.getElementById('chatArea').innerHTML = `
      <div class="chat-header">
        <div class="avatar">${friendName[0].toUpperCase()}</div>
        <div class="name">${escHtml(friendName)}</div>
      </div>
      <div class="chat-messages" id="chatMessages"><div class="loading">加载中...</div></div>
      <div class="chat-input-area">
        <textarea id="msgInput" placeholder="输入消息... Enter发送" rows="1" onkeydown="handleMsgKey(event)"></textarea>
        <button class="btn btn-white" onclick="sendMsg()">发送</button>
      </div>
    `
    await loadMessages()
    msgInterval = setInterval(loadMessages, 4000)
  }

  async function loadMessages() {
    const container = document.getElementById('chatMessages')
    if (!container || !currentFriend) return
    const { data } = await sb.from('messages').select('*')
      .or(`and(sender_id.eq.${user.id},receiver_id.eq.${currentFriend.id}),and(sender_id.eq.${currentFriend.id},receiver_id.eq.${user.id})`)
      .order('created_at', { ascending: true })
    if (!data?.length) { container.innerHTML = '<div class="empty">暂无消息，说点什么吧</div>'; return }
    const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60
    container.innerHTML = data.map(m => `
      <div class="msg ${m.sender_id === user.id ? 'mine' : ''}">
        <div>
          <div class="msg-bubble">${escHtml(m.content)}</div>
          <div class="msg-time">${timeAgo(m.created_at)}</div>
        </div>
      </div>
    `).join('')
    if (atBottom) container.scrollTop = container.scrollHeight
  }

  window.sendMsg = async function() {
    const input = document.getElementById('msgInput')
    if (!input) return
    const content = input.value.trim()
    if (!content || !currentFriend) return
    input.value = ''
    const { error } = await sb.from('messages').insert({ sender_id: user.id, receiver_id: currentFriend.id, content })
    if (error) { showToast('发送失败', 'error'); return }
    await loadMessages()
  }

  window.handleMsgKey = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg() }
  }

  window.acceptRequest = async function(id) {
    const { error } = await sb.from('friendships').update({ status: 'accepted' }).eq('id', id)
    if (error) { showToast('操作失败', 'error'); return }
    showToast('已接受好友请求', 'success')
    loadRequests(); loadFriends()
  }

  window.rejectRequest = async function(id) {
    const { error } = await sb.from('friendships').delete().eq('id', id)
    if (error) { showToast('操作失败', 'error'); return }
    showToast('已拒绝', '')
    loadRequests()
  }

  window.searchUsers = async function() {
    const keyword = document.getElementById('searchUsername').value.trim()
    if (!keyword) return
    const container = document.getElementById('searchResults')
    container.innerHTML = '<div class="loading">搜索中...</div>'
    const { data } = await sb.from('profiles').select('id,username').ilike('username', `%${keyword}%`).neq('id', user.id).limit(8)
    if (!data?.length) { container.innerHTML = '<div class="empty">没有找到用户</div>'; return }
    container.innerHTML = data.map(p => `
      <div class="search-result">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="avatar">${p.username[0].toUpperCase()}</div>
          <span style="font-size:13px;color:var(--text)">${escHtml(p.username)}</span>
        </div>
        <button class="btn btn-dark" style="padding:4px 10px;font-size:12px" onclick="sendRequest('${p.id}','${escHtml(p.username)}')">添加</button>
      </div>
    `).join('')
  }

  window.sendRequest = async function(receiverId, name) {
    const { data: existing } = await sb.from('friendships').select('id')
      .or(`and(sender_id.eq.${user.id},receiver_id.eq.${receiverId}),and(sender_id.eq.${receiverId},receiver_id.eq.${user.id})`)
      .maybeSingle()
    if (existing) { showToast('已经是好友或请求已发送', ''); return }
    const { error } = await sb.from('friendships').insert({ sender_id: user.id, receiver_id: receiverId, status: 'pending' })
    if (error) { showToast('发送失败', 'error'); return }
    showToast(`已向 ${name} 发送好友请求`, 'success')
  }

  // ===== 登录注册 =====
  window.openAuth = () => { isLogin = true; updateAuthUI(); document.getElementById('authModal').classList.add('active') }
  window.closeAuth = () => document.getElementById('authModal').classList.remove('active')
  window.openUpload = () => document.getElementById('uploadModal').classList.add('active')
  window.closeUpload = () => document.getElementById('uploadModal').classList.remove('active')
  window.openNewPost = () => { if (!user) { openAuth(); return } document.getElementById('newPostModal').classList.add('active') }
  window.closeNewPost = () => document.getElementById('newPostModal').classList.remove('active')
  window.openAddFriend = () => {
    document.getElementById('searchResults').innerHTML = ''
    document.getElementById('searchUsername').value = ''
    document.getElementById('addFriendModal').classList.add('active')
  }
  window.closeAddFriend = () => document.getElementById('addFriendModal').classList.remove('active')
  window.toggleAuth = function() { isLogin = !isLogin; updateAuthUI() }

  function updateAuthUI() {
    document.getElementById('authTitle').textContent = isLogin ? '登录' : '注册'
    document.getElementById('authSwitch').textContent = isLogin ? '没有账号？去注册' : '已有账号？去登录'
    document.getElementById('usernameWrap').style.display = isLogin ? 'none' : 'block'
  }

  window.submitAuth = async function() {
    const email = document.getElementById('authEmail').value.trim()
    const password = document.getElementById('authPassword').value.trim()
    const username = document.getElementById('authUsername').value.trim()
    if (!email || !password) { showToast('请填写邮箱和密码', 'error'); return }
    if (isLogin) {
      const { data, error } = await sb.auth.signInWithPassword({ email, password })
      if (error) { showToast('登录失败：' + error.message, 'error'); return }
      user = data.user
      await refreshNav()
      await loadLikedChars()
      await loadLikedForum()
      closeAuth()
      showToast('登录成功', 'success')
      loadChars()
      document.getElementById('uploadBtn').style.display = 'block'
    } else {
      if (!username) { showToast('请填写用户名', 'error'); return }
      const { data, error } = await sb.auth.signUp({ email, password, options: { data: { username } } })
      if (error) { showToast('注册失败：' + error.message, 'error'); return }
      user = data.user
      if (user) { await sb.from('profiles').upsert({ id: user.id, username }); await refreshNav() }
      closeAuth()
      showToast('注册成功！请查收验证邮件', 'success')
    }
  }

  window.logout = async function() {
    if (msgInterval) clearInterval(msgInterval)
    await sb.auth.signOut()
    user = null
    currentFriend = null
    likedChars.clear()
    likedPosts.clear()
    likedReplies.clear()
    document.getElementById('navUser').textContent = ''
    document.getElementById('authBtn').textContent = '登录'
    document.getElementById('authBtn').onclick = openAuth
    document.getElementById('uploadBtn').style.display = 'none'
    showToast('已退出登录', 'success')
    loadChars()
  }

  // ===== 工具函数 =====
  function timeAgo(str) {
    const diff = (Date.now() - new Date(str)) / 1000
    if (diff < 60) return '刚刚'
    if (diff < 3600) return Math.floor(diff/60) + '分钟前'
    if (diff < 86400) return Math.floor(diff/3600) + '小时前'
    return Math.floor(diff/86400) + '天前'
  }

  function escHtml(str) {
    if (!str) return ''
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  window.showToast = function(msg, type) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.className = 'toast show ' + (type||'')
    setTimeout(() => t.className = 'toast', 2800)
  }

  init()
</script>
</body>
</html>
