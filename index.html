<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI角色社区</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --bg4: #222222;
      --text: #f0f0f0;
      --text2: #888888;
      --text3: #555555;
      --border: #2a2a2a;
      --border2: #333333;
      --white: #ffffff;
      --danger: #ff4444;
      --success: #44cc88;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* 导航 */
    .navbar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .logo {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.3px;
    }
    .nav-links { display: flex; gap: 2px; }
    .nav-links a {
      color: var(--text2);
      text-decoration: none;
      padding: 5px 11px;
      border-radius: 6px;
      font-size: 13px;
      transition: all 0.15s;
    }
    .nav-links a:hover { color: var(--text); background: var(--bg3); }
    .nav-links a.active { color: var(--white); background: var(--bg3); }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-username { font-size: 12px; color: var(--text3); }

    /* 按钮 */
    .btn {
      padding: 7px 14px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-white {
      background: var(--white);
      color: #000;
    }
    .btn-white:hover { background: #e0e0e0; }
    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover { background: var(--bg3); color: var(--text); }
    .btn-dark {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn-dark:hover { background: var(--bg4); }

    /* 容器 */
    .container { max-width: 1080px; margin: 0 auto; padding: 28px 16px; }

    /* 表单 */
    input, textarea, select {
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      width: 100%;
      transition: border 0.15s;
      font-family: inherit;
    }
    input:focus, textarea:focus { border-color: #555; }
    input::placeholder, textarea::placeholder { color: var(--text3); }
    textarea { resize: vertical; min-height: 88px; }
    label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 5px; letter-spacing: 0.3px; text-transform: uppercase; }
    .form-group { margin-bottom: 14px; }

    /* 弹窗 */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 24px;
      width: calc(100% - 32px);
      max-width: 420px;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
    }
    .modal h2 { margin-bottom: 20px; font-size: 16px; font-weight: 600; color: var(--white); }
    .close-btn {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: 20px; line-height: 1;
      transition: color 0.15s;
    }
    .close-btn:hover { color: var(--text); }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 8px; padding: 10px 18px; font-size: 13px;
      z-index: 9999; opacity: 0; transition: all 0.25s; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    /* 标签 */
    .tag {
      display: inline-block;
      background: var(--bg3);
      color: var(--text2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      letter-spacing: 0.2px;
    }

    /* 市场头部 */
    .market-top {
      margin-bottom: 24px;
    }
    .market-top h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;
    }
    .market-top p {
      font-size: 13px;
      color: var(--text3);
    }
    .market-controls {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .market-controls input { flex: 1; min-width: 180px; }

    /* 筛选标签 */
    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-btn {
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text3);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
      font-family: inherit;
      letter-spacing: 0.2px;
    }
    .filter-btn:hover { color: var(--text); border-color: #555; }
    .filter-btn.active {
      background: var(--white);
      color: #000;
      border-color: var(--white);
      font-weight: 500;
    }

    /* 角色卡片网格 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .char-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .char-card:hover {
      border-color: var(--border2);
      background: var(--bg3);
    }
    .char-head { display: flex; align-items: center; gap: 10px; }
    .char-emoji {
      width: 44px; height: 44px;
      border-radius: 8px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .char-name { font-size: 14px; font-weight: 600; color: var(--white); }
    .char-author { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .char-desc {
      font-size: 12px; color: var(--text2); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .char-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .char-foot {
      display: flex; align-items: center;
      justify-content: space-between; margin-top: auto;
    }
    .char-stats { display: flex; gap: 10px; font-size: 11px; color: var(--text3); }
    .like-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text3);
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.15s;
      font-family: inherit;
    }
    .like-btn:hover { border-color: #555; color: var(--text); }
    .like-btn.liked { border-color: #888; color: var(--text); }

    /* 详情弹窗 */
    .detail-emoji {
      width: 64px; height: 64px;
      border-radius: 12px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin-bottom: 14px;
    }
    .section-label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 14px 0 6px;
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    .empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 13px; }
    .loading { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }

    select { width: auto; background: var(--bg2); }

    @media(max-width: 600px) {
      .navbar { padding: 0 12px; }
      .nav-links { display: none; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">AICA</a>
  <div class="nav-links">
    <a href="index.html" class="active">角色市场</a>
    <a href="forum.html">论坛</a>
    <a href="friends.html">好友</a>
    <a href="profile.html">我的</a>
  </div>
  <div class="nav-right">
    <span class="nav-username" id="navUser"></span>
    <button class="btn btn-ghost" id="authBtn" onclick="openAuth()">登录</button>
    <button class="btn btn-white" id="uploadBtn" style="display:none" onclick="openUpload()">+ 发布角色</button>
  </div>
</nav>

<div class="container">
  <div class="market-top">
    <h1>角色市场</h1>
    <p>发现和分享你的 AI 角色</p>
    <div class="market-controls">
      <input type="text" id="searchInput" placeholder="搜索角色名称..." />
      <select id="sortSelect" onchange="loadChars()">
        <option value="created_at">最新发布</option>
        <option value="downloads">最多下载</option>
        <option value="likes">最多点赞</option>
      </select>
      <button class="btn btn-dark" onclick="loadChars()">搜索</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterTag(this,'')">全部</button>
    <button class="filter-btn" onclick="filterTag(this,'温柔')">温柔</button>
    <button class="filter-btn" onclick="filterTag(this,'搞笑')">搞笑</button>
    <button class="filter-btn" onclick="filterTag(this,'傲娇')">傲娇</button>
    <button class="filter-btn" onclick="filterTag(this,'冒险')">冒险</button>
    <button class="filter-btn" onclick="filterTag(this,'学习')">学习</button>
    <button class="filter-btn" onclick="filterTag(this,'游戏')">游戏</button>
  </div>

  <div class="grid" id="charGrid">
    <div class="loading">加载中...</div>
  </div>
</div>

<!-- 登录注册 -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <button class="close-btn" onclick="closeAuth()">×</button>
    <h2 id="authTitle">登录</h2>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="authEmail" placeholder="your@email.com" />
    </div>
    <div class="form-group" id="usernameWrap" style="display:none">
      <label>用户名</label>
      <input type="text" id="authUsername" placeholder="起个名字..." />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="••••••••" />
    </div>
    <button class="btn btn-white" style="width:100%;margin-bottom:12px;padding:10px" onclick="submitAuth()">确认</button>
    <p style="text-align:center;font-size:12px;color:var(--text3)">
      <span id="authSwitch" onclick="toggleAuth()" style="cursor:pointer;color:var(--text2)">没有账号？去注册</span>
    </p>
  </div>
</div>

<!-- 发布角色 -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal" style="max-width:460px">
    <button class="close-btn" onclick="closeUpload()">×</button>
    <h2>发布角色</h2>
    <div class="form-group">
      <label>角色名称</label>
      <input type="text" id="charName" placeholder="角色叫什么？" />
    </div>
    <div class="form-group">
      <label>头像 Emoji</label>
      <input type="text" id="charEmoji" placeholder="🐱" maxlength="2" />
    </div>
    <div class="form-group">
      <label>简介</label>
      <textarea id="charDesc" placeholder="简单描述这个角色..."></textarea>
    </div>
    <div class="form-group">
      <label>详细人设</label>
      <textarea id="charPersonality" placeholder="性格、说话方式、背景故事..." style="min-height:110px"></textarea>
    </div>
    <div class="form-group">
      <label>标签（逗号分隔）</label>
      <input type="text" id="charTags" placeholder="温柔, 搞笑, 游戏" />
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-white" style="flex:1" onclick="submitChar()">发布</button>
      <button class="btn btn-ghost" onclick="closeUpload()">取消</button>
    </div>
  </div>
</div>

<!-- 角色详情 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:480px">
    <button class="close-btn" onclick="closeDetail()">×</button>
    <div id="detailContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  const sb = createClient(
    'https://uyziqquxjbgajyqayksu.supabase.co',
    'sb_publishable__GfyF7Dtetvt0Tip5Vuf9w_o1YKRhPm'
  )

  let user = null
  let activeTag = ''
  let isLogin = true
  let currentChar = null
  let likedSet = new Set()

  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    if (session?.user) {
      user = session.user
      await refreshNav()
      await loadLiked()
    }
    loadChars()
  }

  async function refreshNav() {
    if (!user) return
    const { data: p } = await sb.from('profiles').select('username').eq('id', user.id).single()
    document.getElementById('navUser').textContent = p?.username || ''
    document.getElementById('authBtn').textContent = '退出'
    document.getElementById('authBtn').onclick = logout
    document.getElementById('uploadBtn').style.display = 'block'
  }

  async function loadLiked() {
    if (!user) return
    const { data } = await sb.from('character_likes').select('character_id').eq('user_id', user.id)
    if (data) data.forEach(r => likedSet.add(r.character_id))
  }

  window.loadChars = async function() {
    const grid = document.getElementById('charGrid')
    grid.innerHTML = '<div class="loading">加载中...</div>'
    const sort = document.getElementById('sortSelect').value
    const search = document.getElementById('searchInput').value.trim()
    let q = sb.from('character_market').select('*, profiles(username)').eq('is_public', true).order(sort, { ascending: false })
    if (activeTag) q = q.contains('tags', [activeTag])
    if (search) q = q.ilike('name', `%${search}%`)
    const { data, error } = await q
    if (error || !data?.length) {
      grid.innerHTML = '<div class="empty">还没有角色，来发布第一个吧</div>'
      return
    }
    grid.innerHTML = data.map(c => `
      <div class="char-card" onclick="openDetail('${c.id}')">
        <div class="char-head">
          <div class="char-emoji">${c.avatar || '🤖'}</div>
          <div>
            <div class="char-name">${escHtml(c.name)}</div>
            <div class="char-author">by ${escHtml(c.profiles?.username || '匿名')}</div>
          </div>
        </div>
        <div class="char-desc">${escHtml(c.description || '暂无简介')}</div>
        <div class="char-tags">${(c.tags||[]).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}</div>
        <div class="char-foot">
          <div class="char-stats">
            <span>↓ ${c.downloads||0}</span>
            <span>♥ ${c.likes||0}</span>
          </div>
          <button class="like-btn ${likedSet.has(c.id)?'liked':''}" onclick="event.stopPropagation();likeChar('${c.id}',this)">
            ${likedSet.has(c.id)?'♥ 已喜欢':'♡ 喜欢'}
          </button>
        </div>
      </div>
    `).join('')
  }

  window.filterTag = function(btn, tag) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    activeTag = tag
    loadChars()
  }

  window.likeChar = async function(id, btn) {
    if (!user) { openAuth(); return }
    if (likedSet.has(id)) return
    const { error } = await sb.from('character_likes').insert({ user_id: user.id, character_id: id })
    if (error) { showToast('点赞失败', 'error'); return }
    likedSet.add(id)
    btn.classList.add('liked')
    btn.textContent = '♥ 已喜欢'
    await sb.rpc('increment_likes', { char_id: id })
    showToast('已点赞', 'success')
  }

  window.openDetail = async function(id) {
    const { data: c } = await sb.from('character_market').select('*, profiles(username)').eq('id', id).single()
    if (!c) return
    currentChar = c
    document.getElementById('detailContent').innerHTML = `
      <div class="detail-emoji">${c.avatar || '🤖'}</div>
      <div style="font-size:18px;font-weight:700;color:var(--white);margin-bottom:4px">${escHtml(c.name)}</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px">
        by ${escHtml(c.profiles?.username || '匿名')} &nbsp;·&nbsp; ↓ ${c.downloads||0} &nbsp;·&nbsp; ♥ ${c.likes||0}
      </div>
      <div class="char-tags">${(c.tags||[]).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}</div>
      <hr class="divider">
      <div class="section-label">简介</div>
      <p style="font-size:13px;line-height:1.7;color:var(--text2)">${escHtml(c.description||'暂无')}</p>
      <div class="section-label">详细人设</div>
      <p style="font-size:13px;line-height:1.7;color:var(--text2);white-space:pre-wrap">${escHtml(c.personality||'暂无')}</p>
      <hr class="divider">
      <div style="display:flex;gap:8px">
        <button class="btn btn-white" style="flex:1" onclick="downloadChar()">↓ 下载角色</button>
        <button class="btn btn-ghost" onclick="likeCharDetail('${c.id}')">♡ 喜欢</button>
      </div>
    `
    document.getElementById('detailModal').classList.add('active')
    sb.from('character_market').update({ downloads: (c.downloads||0) + 1 }).eq('id', id)
  }

  window.closeDetail = () => document.getElementById('detailModal').classList.remove('active')

  window.downloadChar = function() {
    if (!currentChar) return
    const data = currentChar.character_data || {
      name: currentChar.name, avatar: currentChar.avatar,
      personality: currentChar.personality,
      description: currentChar.description, tags: currentChar.tags
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = `${currentChar.name}.json`
    a.click()
    showToast('下载成功', 'success')
  }

  window.likeCharDetail = async function(id) {
    if (!user) { openAuth(); return }
    if (likedSet.has(id)) { showToast('已经点赞过了', ''); return }
    const { error } = await sb.from('character_likes').insert({ user_id: user.id, character_id: id })
    if (!error) {
      likedSet.add(id)
      await sb.rpc('increment_likes', { char_id: id })
      showToast('已点赞', 'success')
    }
  }

  window.submitChar = async function() {
    if (!user) { openAuth(); return }
    const name = document.getElementById('charName').value.trim()
    const avatar = document.getElementById('charEmoji').value.trim()
    const desc = document.getElementById('charDesc').value.trim()
    const personality = document.getElementById('charPersonality').value.trim()
    const tags = document.getElementById('charTags').value.split(',').map(t=>t.trim()).filter(Boolean)
    if (!name || !personality) { showToast('名称和人设不能为空', 'error'); return }
    const { error } = await sb.from('character_market').insert({
      author_id: user.id, name, avatar, description: desc,
      personality, tags, is_public: true,
      character_data: { name, avatar, personality, description: desc, tags }
    })
    if (error) { showToast('发布失败：' + error.message, 'error'); return }
    showToast('发布成功', 'success')
    closeUpload()
    ;['charName','charEmoji','charDesc','charPersonality','charTags'].forEach(id => document.getElementById(id).value = '')
    loadChars()
  }

  window.openAuth = () => { isLogin = true; updateAuthUI(); document.getElementById('authModal').classList.add('active') }
  window.closeAuth = () => document.getElementById('authModal').classList.remove('active')
  window.openUpload = () => document.getElementById('uploadModal').classList.add('active')
  window.closeUpload = () => document.getElementById('uploadModal').classList.remove('active')

  window.toggleAuth = function() { isLogin = !isLogin; updateAuthUI() }

  function updateAuthUI() {
    document.getElementById('authTitle').textContent = isLogin ? '登录' : '注册'
    document.getElementById('authSwitch').textContent = isLogin ? '没有账号？去注册' : '已有账号？去登录'
    document.getElementById('usernameWrap').style.display = isLogin ? 'none' : 'block'
  }

  window.submitAuth = async function() {
    const email = document.getElementById('authEmail').value.trim()
    const password = document.getElementById('authPassword').value.trim()
    const username = document.getElementById('authUsername').value.trim()
    if (!email || !password) { showToast('请填写邮箱和密码', 'error'); return }
    if (isLogin) {
      const { data, error } = await sb.auth.signInWithPassword({ email, password })
      if (error) { showToast('登录失败：' + error.message, 'error'); return }
      user = data.user
      await refreshNav(); await loadLiked()
      closeAuth(); showToast('登录成功', 'success'); loadChars()
    } else {
      if (!username) { showToast('请填写用户名', 'error'); return }
      const { data, error } = await sb.auth.signUp({ email, password, options: { data: { username } } })
      if (error) { showToast('注册失败：' + error.message, 'error'); return }
      user = data.user
      if (user) { await sb.from('profiles').upsert({ id: user.id, username }); await refreshNav() }
      closeAuth(); showToast('注册成功！请查收验证邮件', 'success')
    }
  }

  window.logout = async function() {
    await sb.auth.signOut()
    user = null; likedSet.clear()
    document.getElementById('navUser').textContent = ''
    document.getElementById('authBtn').textContent = '登录'
    document.getElementById('authBtn').onclick = openAuth
    document.getElementById('uploadBtn').style.display = 'none'
    showToast('已退出登录', 'success'); loadChars()
  }

  function escHtml(str) {
    if (!str) return ''
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  window.showToast = function(msg, type) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.className = 'toast show ' + (type||'')
    setTimeout(() => t.className = 'toast', 2800)
  }

  init()
</script>
</body>
</html>
