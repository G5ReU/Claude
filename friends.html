<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好友 - AICA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a; --bg4: #222222;
      --text: #f0f0f0; --text2: #888888; --text3: #555555;
      --border: #2a2a2a; --border2: #333333; --white: #ffffff;
      --danger: #ff4444; --success: #44cc88;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    .navbar {
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 52px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 15px; font-weight: 700; color: var(--white); text-decoration: none; letter-spacing: -0.3px; }
    .nav-links { display: flex; gap: 2px; }
    .nav-links a { color: var(--text2); text-decoration: none; padding: 5px 11px; border-radius: 6px; font-size: 13px; transition: all 0.15s; }
    .nav-links a:hover { color: var(--text); background: var(--bg3); }
    .nav-links a.active { color: var(--white); background: var(--bg3); }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-username { font-size: 12px; color: var(--text3); }
    .btn { padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; font-family: inherit; }
    .btn-white { background: var(--white); color: #000; }
    .btn-white:hover { background: #e0e0e0; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
    .btn-ghost:hover { background: var(--bg3); color: var(--text); }
    .btn-dark { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
    .btn-dark:hover { background: var(--bg4); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--border2); }
    .btn-danger:hover { background: var(--bg3); }
    .container { max-width: 960px; margin: 0 auto; padding: 28px 16px; }
    input, textarea {
      background: var(--bg2); border: 1px solid var(--border2); color: var(--text);
      padding: 9px 12px; border-radius: 7px; font-size: 13px; outline: none;
      width: 100%; transition: border 0.15s; font-family: inherit;
    }
    input:focus, textarea:focus { border-color: #555; }
    input::placeholder, textarea::placeholder { color: var(--text3); }
    textarea { resize: none; }
    label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 5px; letter-spacing: 0.4px; text-transform: uppercase; }
    .form-group { margin-bottom: 14px; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px;
      padding: 24px; width: calc(100% - 32px); max-width: 420px;
      max-height: 88vh; overflow-y: auto; position: relative;
    }
    .modal h2 { margin-bottom: 20px; font-size: 16px; font-weight: 600; color: var(--white); }
    .close-btn {
      position: absolute; top: 14px; right: 16px; background: none; border: none;
      color: var(--text3); cursor: pointer; font-size: 20px; line-height: 1; transition: color 0.15s;
    }
    .close-btn:hover { color: var(--text); }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 8px; padding: 10px 18px; font-size: 13px;
      z-index: 9999; opacity: 0; transition: all 0.25s; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; }
    .loading { text-align: center; padding: 30px; color: var(--text3); font-size: 13px; }

    /* 布局 */
    .friends-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 14px;
      height: calc(100vh - 52px - 56px);
    }

    /* 左侧面板 */
    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .panel-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-size: 12px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 500;
    }

    .panel-body {
      overflow-y: auto;
      max-height: 220px;
    }

    .friend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .friend-item:last-child { border-bottom: none; }
    .friend-item:hover { background: var(--bg3); }
    .friend-item.active { background: var(--bg3); }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: var(--text2);
      flex-shrink: 0;
    }

    .friend-name { font-size: 13px; color: var(--text); font-weight: 500; }
    .friend-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

    .request-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .request-item:last-child { border-bottom: none; }
    .request-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .request-name { font-size: 13px; color: var(--text); }
    .request-actions { display: flex; gap: 6px; }

    /* 右侧聊天区 */
    .chat-area {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      font-size: 13px;
    }

    .chat-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header .name { font-size: 14px; font-weight: 600; color: var(--white); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      display: flex;
      gap: 8px;
      max-width: 75%;
    }
    .msg.mine {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-bubble {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }
    .msg.mine .msg-bubble {
      background: var(--bg4);
      border-color: #3a3a3a;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text3);
      margin-top: 3px;
      text-align: right;
    }
    .msg.mine .msg-time { text-align: left; }

    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .chat-input-area textarea {
      flex: 1;
      min-height: 38px;
      max-height: 100px;
      padding: 8px 12px;
      border-radius: 7px;
    }

    /* 搜索添加好友 */
    .search-result {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .search-result:last-child { border-bottom: none; }

    /* 登录提示页 */
    .login-prompt {
      text-align: center;
      padding: 80px 20px;
      color: var(--text3);
    }
    .login-prompt p { font-size: 14px; margin-bottom: 16px; }

    @media(max-width: 640px) {
      .friends-layout { grid-template-columns: 1fr; height: auto; }
      .chat-area { height: 60vh; }
      .nav-links { display: none; }
      .navbar { padding: 0 12px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">AICA</a>
  <div class="nav-links">
    <a href="index.html">角色市场</a>
    <a href="forum.html">论坛</a>
    <a href="friends.html" class="active">好友</a>
    <a href="profile.html">我的</a>
  </div>
  <div class="nav-right">
    <span class="nav-username" id="navUser"></span>
    <button class="btn btn-ghost" id="authBtn" onclick="openAuth()">登录</button>
  </div>
</nav>

<div class="container">
  <div id="mainContent"></div>
</div>

<!-- 登录注册 -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <button class="close-btn" onclick="closeAuth()">×</button>
    <h2 id="authTitle">登录</h2>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="authEmail" placeholder="your@email.com" />
    </div>
    <div class="form-group" id="usernameWrap" style="display:none">
      <label>用户名</label>
      <input type="text" id="authUsername" placeholder="起个名字..." />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="••••••••" />
    </div>
    <button class="btn btn-white" style="width:100%;margin-bottom:12px;padding:10px" onclick="submitAuth()">确认</button>
    <p style="text-align:center;font-size:12px;color:var(--text3)">
      <span id="authSwitch" onclick="toggleAuth()" style="cursor:pointer;color:var(--text2)">没有账号？去注册</span>
    </p>
  </div>
</div>

<!-- 添加好友弹窗 -->
<div class="modal-overlay" id="addFriendModal">
  <div class="modal">
    <button class="close-btn" onclick="closeAddFriend()">×</button>
    <h2>添加好友</h2>
    <div class="form-group">
      <label>搜索用户名</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="searchUsername" placeholder="输入用户名..." />
        <button class="btn btn-dark" onclick="searchUsers()">搜索</button>
      </div>
    </div>
    <div id="searchResults"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  const sb = createClient(
    'https://uyziqquxjbgajyqayksu.supabase.co',
    'sb_publishable__GfyF7Dtetvt0Tip5Vuf9w_o1YKRhPm'
  )

  let user = null
  let isLogin = true
  let currentFriend = null
  let msgInterval = null

  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    if (session?.user) {
      user = session.user
      await refreshNav()
      renderFriendsPage()
    } else {
      renderLoginPrompt()
    }
  }

  async function refreshNav() {
    if (!user) return
    const { data: p } = await sb.from('profiles').select('username').eq('id', user.id).single()
    document.getElementById('navUser').textContent = p?.username || ''
    document.getElementById('authBtn').textContent = '退出'
    document.getElementById('authBtn').onclick = logout
  }

  // 未登录提示
  function renderLoginPrompt() {
    document.getElementById('mainContent').innerHTML = `
      <div class="login-prompt">
        <p>登录后才能使用好友功能</p>
        <button class="btn btn-white" onclick="openAuth()">登录 / 注册</button>
      </div>
    `
  }

  // 渲染好友页面
  async function renderFriendsPage() {
    document.getElementById('mainContent').innerHTML = `
      <div class="friends-layout">
        <div class="left-panel">
          <!-- 好友请求 -->
          <div class="panel-card">
            <div class="panel-header">
              <span class="panel-title">好友请求</span>
              <button class="btn btn-dark" style="padding:4px 10px;font-size:12px" onclick="openAddFriend()">+ 添加</button>
            </div>
            <div class="panel-body" id="requestsList">
              <div class="loading">加载中...</div>
            </div>
          </div>
          <!-- 好友列表 -->
          <div class="panel-card" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
            <div class="panel-header">
              <span class="panel-title">好友列表</span>
            </div>
            <div class="panel-body" style="max-height:none;flex:1" id="friendsList">
              <div class="loading">加载中...</div>
            </div>
          </div>
        </div>
        <!-- 右侧聊天 -->
        <div class="chat-area" id="chatArea">
          <div class="chat-placeholder">选择一个好友开始聊天</div>
        </div>
      </div>
    `
    loadRequests()
    loadFriends()
  }

  // 加载好友请求
  async function loadRequests() {
    const container = document.getElementById('requestsList')
    if (!container) return
    const { data } = await sb
      .from('friendships')
      .select('*, profiles!friendships_sender_id_fkey(username)')
      .eq('receiver_id', user.id)
      .eq('status', 'pending')
    if (!data?.length) {
      container.innerHTML = '<div class="empty">暂无新请求</div>'
      return
    }
    container.innerHTML = data.map(r => `
      <div class="request-item">
        <div class="request-top">
          <div class="avatar">${(r.profiles?.username||'?')[0].toUpperCase()}</div>
          <span class="request-name">${escHtml(r.profiles?.username||'未知用户')}</span>
        </div>
        <div class="request-actions">
          <button class="btn btn-white" style="padding:4px 10px;font-size:12px" onclick="acceptRequest('${r.id}')">接受</button>
          <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" onclick="rejectRequest('${r.id}')">拒绝</button>
        </div>
      </div>
    `).join('')
  }

  // 加载好友列表
  async function loadFriends() {
    const container = document.getElementById('friendsList')
    if (!container) return
    const { data } = await sb
      .from('friendships')
      .select('*, sender:profiles!friendships_sender_id_fkey(id,username), receiver:profiles!friendships_receiver_id_fkey(id,username)')
      .or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`)
      .eq('status', 'accepted')
    if (!data?.length) {
      container.innerHTML = '<div class="empty">还没有好友，去添加吧</div>'
      return
    }
    container.innerHTML = data.map(f => {
      const friend = f.sender_id === user.id ? f.receiver : f.sender
      return `
        <div class="friend-item" id="friend-${friend.id}" onclick="openChat('${friend.id}','${escHtml(friend.username)}')">
          <div class="avatar">${friend.username[0].toUpperCase()}</div>
          <div>
            <div class="friend-name">${escHtml(friend.username)}</div>
            <div class="friend-sub">点击开始聊天</div>
          </div>
        </div>
      `
    }).join('')
  }

  // 打开聊天
  window.openChat = async function(friendId, friendName) {
    currentFriend = { id: friendId, name: friendName }
    if (msgInterval) clearInterval(msgInterval)

    // 高亮选中
    document.querySelectorAll('.friend-item').forEach(el => el.classList.remove('active'))
    const el = document.getElementById(`friend-${friendId}`)
    if (el) el.classList.add('active')

    document.getElementById('chatArea').innerHTML = `
      <div class="chat-header">
        <div class="avatar">${friendName[0].toUpperCase()}</div>
        <div class="name">${escHtml(friendName)}</div>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="loading">加载中...</div>
      </div>
      <div class="chat-input-area">
        <textarea id="msgInput" placeholder="输入消息..." rows="1"
          onkeydown="handleMsgKey(event)"></textarea>
        <button class="btn btn-white" onclick="sendMsg()">发送</button>
      </div>
    `

    await loadMessages()
    msgInterval = setInterval(loadMessages, 4000)
  }

  // 加载消息
  async function loadMessages() {
    const container = document.getElementById('chatMessages')
    if (!container || !currentFriend) return
    const { data } = await sb
      .from('messages')
      .select('*')
      .or(`and(sender_id.eq.${user.id},receiver_id.eq.${currentFriend.id}),and(sender_id.eq.${currentFriend.id},receiver_id.eq.${user.id})`)
      .order('created_at', { ascending: true })
    if (!data?.length) {
      container.innerHTML = '<div class="empty">暂无消息，说点什么吧</div>'
      return
    }
    const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60
    container.innerHTML = data.map(m => `
      <div class="msg ${m.sender_id === user.id ? 'mine' : ''}">
        <div>
          <div class="msg-bubble">${escHtml(m.content)}</div>
          <div class="msg-time">${timeAgo(m.created_at)}</div>
        </div>
      </div>
    `).join('')
    if (wasAtBottom) container.scrollTop = container.scrollHeight
  }

  // 发送消息
  window.sendMsg = async function() {
    const input = document.getElementById('msgInput')
    if (!input) return
    const content = input.value.trim()
    if (!content || !currentFriend) return
    input.value = ''
    const { error } = await sb.from('messages').insert({
      sender_id: user.id,
      receiver_id: currentFriend.id,
      content
    })
    if (error) { showToast('发送失败', 'error'); return }
    await loadMessages()
  }

  window.handleMsgKey = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      sendMsg()
    }
  }

  // 接受好友请求
  window.acceptRequest = async function(id) {
    const { error } = await sb.from('friendships').update({ status: 'accepted' }).eq('id', id)
    if (error) { showToast('操作失败', 'error'); return }
    showToast('已接受好友请求', 'success')
    loadRequests()
    loadFriends()
  }

  // 拒绝好友请求
  window.rejectRequest = async function(id) {
    const { error } = await sb.from('friendships').delete().eq('id', id)
    if (error) { showToast('操作失败', 'error'); return }
    showToast('已拒绝', '')
    loadRequests()
  }

  // 搜索用户
  window.searchUsers = async function() {
    const keyword = document.getElementById('searchUsername').value.trim()
    if (!keyword) return
    const container = document.getElementById('searchResults')
    container.innerHTML = '<div class="loading">搜索中...</div>'
    const { data } = await sb
      .from('profiles')
      .select('id, username')
      .ilike('username', `%${keyword}%`)
      .neq('id', user.id)
      .limit(8)
    if (!data?.length) {
      container.innerHTML = '<div class="empty">没有找到用户</div>'
      return
    }
    container.innerHTML = data.map(p => `
      <div class="search-result">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="avatar">${p.username[0].toUpperCase()}</div>
          <span style="font-size:13px;color:var(--text)">${escHtml(p.username)}</span>
        </div>
        <button class="btn btn-dark" style="padding:4px 10px;font-size:12px" onclick="sendRequest('${p.id}','${escHtml(p.username)}')">添加</button>
      </div>
    `).join('')
  }

  // 发送好友请求
  window.sendRequest = async function(receiverId, name) {
    const { data: existing } = await sb
      .from('friendships')
      .select('id')
      .or(`and(sender_id.eq.${user.id},receiver_id.eq.${receiverId}),and(sender_id.eq.${receiverId},receiver_id.eq.${user.id})`)
      .single()
    if (existing) { showToast('已经是好友或请求已发送', ''); return }
    const { error } = await sb.from('friendships').insert({
      sender_id: user.id,
      receiver_id: receiverId,
      status: 'pending'
    })
    if (error) { showToast('发送失败', 'error'); return }
    showToast(`已向 ${name} 发送好友请求`, 'success')
  }

  // 登录注册
  window.openAuth = () => { isLogin = true; updateAuthUI(); document.getElementById('authModal').classList.add('active') }
  window.closeAuth = () => document.getElementById('authModal').classList.remove('active')
  window.openAddFriend = () => {
    if (!user) { openAuth(); return }
    document.getElementById('searchResults').innerHTML = ''
    document.getElementById('searchUsername').value = ''
    document.getElementById('addFriendModal').classList.add('active')
  }
  window.closeAddFriend = () => document.getElementById('addFriendModal').classList.remove('active')
  window.toggleAuth = function() { isLogin = !isLogin; updateAuthUI() }

  function updateAuthUI() {
    document.getElementById('authTitle').textContent = isLogin ? '登录' : '注册'
    document.getElementById('authSwitch').textContent = isLogin ? '没有账号？去注册' : '已有账号？去登录'
    document.getElementById('usernameWrap').style.display = isLogin ? 'none' : 'block'
  }

  window.submitAuth = async function() {
    const email = document.getElementById('authEmail').value.trim()
    const password = document.getElementById('authPassword').value.trim()
    const username = document.getElementById('authUsername').value.trim()
    if (!email || !password) { showToast('请填写邮箱和密码', 'error'); return }
    if (isLogin) {
      const { data, error } = await sb.auth.signInWithPassword({ email, password })
      if (error) { showToast('登录失败：' + error.message, 'error'); return }
      user = data.user
      await refreshNav()
      closeAuth()
      showToast('登录成功', 'success')
      renderFriendsPage()
    } else {
      if (!username) { showToast('请填写用户名', 'error'); return }
      const { data, error } = await sb.auth.signUp({ email, password, options: { data: { username } } })
      if (error) { showToast('注册失败：' + error.message, 'error'); return }
      user = data.user
      if (user) { await sb.from('profiles').upsert({ id: user.id, username }); await refreshNav() }
      closeAuth()
      showToast('注册成功！请查收验证邮件', 'success')
      renderFriendsPage()
    }
  }

  window.logout = async function() {
    if (msgInterval) clearInterval(msgInterval)
    await sb.auth.signOut()
    user = null
    currentFriend = null
    document.getElementById('navUser').textContent = ''
    document.getElementById('authBtn').textContent = '登录'
    document.getElementById('authBtn').onclick = openAuth
    showToast('已退出登录', 'success')
    renderLoginPrompt()
  }

  function timeAgo(str) {
    const diff = (Date.now() - new Date(str)) / 1000
    if (diff < 60) return '刚刚'
    if (diff < 3600) return Math.floor(diff/60) + '分钟前'
    if (diff < 86400) return Math.floor(diff/3600) + '小时前'
    return Math.floor(diff/86400) + '天前'
  }

  function escHtml(str) {
    if (!str) return ''
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  window.showToast = function(msg, type) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.className = 'toast show ' + (type||'')
    setTimeout(() => t.className = 'toast', 2800)
  }

  init()
</script>
</body>
</html>
